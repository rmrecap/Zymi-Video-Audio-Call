services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: qibo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qibo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qibo_password}
      POSTGRES_DB: ${POSTGRES_DB:-qibo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qibo-network

  redis:
    image: redis:7-alpine
    container_name: qibo-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-qibo_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qibo-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: qibo-server
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-qibo_user}:${POSTGRES_PASSWORD:-qibo_password}@postgres:5432/${POSTGRES_DB:-qibo_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-qibo_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-admin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      DB_DATA_DIR: /app/data
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qibo-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: qibo-client
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
      - VITE_SOCKET_URL=${VITE_SOCKET_URL:-http://localhost:5000}
    ports:
      - "5175:8080"
    restart: unless-stopped
    networks:
      - qibo-network

volumes:
  postgres_data:
  redis_data:
  server_data:

networks:
  qibo-network:
    driver: bridge