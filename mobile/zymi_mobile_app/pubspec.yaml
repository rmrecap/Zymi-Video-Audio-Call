name: zymi_mobile_app
description: ZYMI Mobile App
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^4.0.4
  google_mobile_ads: ^5.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  socket_io_client: ^2.0.2
  flutter_webrtc: ^0.12.7
  permission_handler: ^11.3.1
  geolocator: ^10.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  flutter_ringtone_player: ^4.0.0+4
  connectivity_plus: ^7.1.1
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  record: 5.1.2
  image_picker: ^1.0.7
  audioplayers: ^6.0.0

dependency_overrides:
  record_platform_interface: 1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
