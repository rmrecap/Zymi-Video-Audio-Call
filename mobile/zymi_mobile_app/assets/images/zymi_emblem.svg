<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background disc -->
  <circle cx="256" cy="256" r="240" fill="#0F172A"/>
  <!-- Outer hexagon glow -->
  <polygon points="256,40 443,148 443,364 256,472 69,364 69,148"
           stroke="#00f0ff" stroke-width="3" opacity="0.15"/>
  <!-- Main hexagon ring -->
  <polygon points="256,54 433,156 433,356 256,458 79,356 79,156"
           stroke="#00f0ff" stroke-width="10" stroke-linejoin="round"/>
  <!-- Inner hexagon accent -->
  <polygon points="256,74 420,168 420,344 256,438 92,344 92,168"
           stroke="#00f0ff" stroke-width="2" stroke-linejoin="round" opacity="0.35"/>
  <!-- Z stroke -->
  <polyline points="170,177 342,177 170,335 342,335"
            stroke="#00f0ff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node top-right -->
  <circle cx="342" cy="177" r="15" fill="#0F172A" stroke="#00f0ff" stroke-width="5"/>
  <!-- Node bottom-left -->
  <circle cx="170" cy="335" r="15" fill="#0F172A" stroke="#00f0ff" stroke-width="5"/>
  <!-- Center pulse -->
  <circle cx="256" cy="256" r="5" fill="#00f0ff" opacity="0.5"/>
</svg>
