services:
  postgres:
    image: postgres:15-alpine
    container_name: qibo-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    # No external port exposure for production security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qibo-network

  redis:
    image: redis:7-alpine
    container_name: qibo-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # No external port exposure for production security
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qibo-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: qibo-server-prod
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      DB_DATA_DIR: /app/data
    ports:
      - "${SERVER_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - qibo-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: qibo-client-prod
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_SOCKET_URL=${VITE_SOCKET_URL}
    # Client container still runs but nginx serves static files
    # No external port exposure - nginx handles frontend
    restart: unless-stopped
    networks:
      - qibo-network

  nginx:
    image: nginx:alpine
    container_name: qibo-nginx-prod
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.template.conf:/etc/nginx/templates/default.conf.template:ro
      - ./client/dist:/usr/share/nginx/html:ro
      - ${SSL_CERT_PATH:-./ssl/cert.pem}:/etc/ssl/certs/qibo.crt:ro
      - ${SSL_KEY_PATH:-./ssl/key.pem}:/etc/ssl/private/qibo.key:ro
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - UPSTREAM_API=server:5000
    depends_on:
      - server
      - client
    restart: unless-stopped
    networks:
      - qibo-network

volumes:
  postgres_data:
  redis_data:
  server_data:

networks:
  qibo-network:
    driver: bridge